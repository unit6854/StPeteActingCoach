[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force a single canonical host: www -> non-www (301).
[[redirects]]
  from = "https://www.stpeteactingcoach.com/*"
  to = "https://stpeteactingcoach.com/:splat"
  status = 301
  force = true

# Long-cache immutable, hashed Astro assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Pretty URLs keep a single trailing-slash form (avoids duplicate content).
[build.processing]
  skip_processing = false
