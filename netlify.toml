[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force a single canonical host: www -> non-www (301).
[[redirects]]
  from = "https://www.stpeteactingcoach.com/*"
  to = "https://stpeteactingcoach.com/:splat"
  status = 301
  force = true

# Long-cache immutable, hashed Astro assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images: fast repeat visits, revalidate in the background, refresh within a day if replaced.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Cache the intro video (rarely changes).
[[headers]]
  for = "/video/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

# Baseline security headers (applied to every response).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for a year (Netlify already serves HTTPS).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # This site uses none of these browser features — turn them off.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"
    # Conservative CSP: clickjacking + base-tag + plugin + form-target protection,
    # without restricting scripts/styles/fonts (so the site and /admin keep working).
    Content-Security-Policy = "frame-ancestors 'self'; base-uri 'self'; object-src 'none'; form-action 'self'"

# Pretty URLs keep a single trailing-slash form (avoids duplicate content).
[build.processing]
  skip_processing = false
