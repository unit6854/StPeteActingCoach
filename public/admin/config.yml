backend:
  name: git-gateway
  branch: main

# Uploaded media is written here and referenced from the site at /images/...
media_folder: "public/images"
public_folder: "/images"

# Nicer editor UX: show a live-ish preview path and keep entries tidy.
site_url: https://stpeteactingcoach.com
display_url: https://stpeteactingcoach.com
logo_url: /images/nav-tile.png

collections:
  - name: "pages"
    label: "Pages"
    delete: false
    editor:
      preview: false
    files:
      - name: "homepage"
        label: "Homepage"
        file: "src/content/homepage.json"
        # Fields below map 1:1 to src/content/homepage.json
        fields:
          # ---------- SEO ----------
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Browser / SEO Title", name: "title", widget: "string" }
              - { label: "Meta Description", name: "description", widget: "text" }
              - { label: "Social Share Image", name: "ogImage", widget: "image", required: false }

          # ---------- NAVIGATION ----------
          - label: "Navigation Bar"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Logo (navbar)", name: "logo", widget: "image" }
              - { label: "Brand Line 1 (for accessibility)", name: "brandLine1", widget: "string" }
              - { label: "Brand Line 2 (for accessibility)", name: "brandLine2", widget: "string" }
              - label: "Menu Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link (URL or #section)", name: "href", widget: "string" }
              - { label: "Button Label", name: "ctaLabel", widget: "string" }
              - { label: "Button Link", name: "ctaHref", widget: "string" }

          # ---------- HERO ----------
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title Line 1", name: "titleLine1", widget: "string" }
              - { label: "Title Line 2 (gold)", name: "titleLine2Gold", widget: "string" }
              - { label: "Title Line 3", name: "titleLine3", widget: "string" }
              - { label: "Title Line 4", name: "titleLine4", widget: "string" }
              - { label: "Subtitle Line 1", name: "subtitleLine1", widget: "string" }
              - { label: "Subtitle Line 2", name: "subtitleLine2", widget: "string" }
              - { label: "Primary Button Label", name: "primaryCtaLabel", widget: "string" }
              - { label: "Primary Button Link", name: "primaryCtaHref", widget: "string" }
              - { label: "Video Link Label", name: "videoCtaLabel", widget: "string" }
              - { label: "Video Link URL", name: "videoCtaHref", widget: "string" }
              - label: "Background Photo (optional)"
                name: "heroImage"
                widget: "image"
                required: false
                hint: "Leave empty to use the built-in cinematic background."

          # ---------- LOCATION ----------
          - label: "Location Block"
            name: "location"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Paragraph 1", name: "paragraph1", widget: "text" }
              - { label: "Paragraph 2", name: "paragraph2", widget: "text" }
              - { label: "Signature (script)", name: "signature", widget: "string" }
              - { label: "Tags Line", name: "tags", widget: "string" }
              - { label: "Left Image", name: "leftImage", widget: "image" }
              - { label: "Right Image", name: "rightImage", widget: "image" }

          # ---------- VALUE PROPS ----------
          - label: "Value Propositions"
            name: "valueProps"
            widget: "object"
            fields:
              - label: "Background Image (stage)"
                name: "backgroundImage"
                widget: "image"
                required: false
                hint: "Leave empty to use the built-in spotlight background."
              - { label: "Heading Line 1", name: "headingLine1", widget: "string" }
              - { label: "Heading Line 2 (gold)", name: "headingLine2Gold", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options: ["clapperboard", "masks", "camera", "monitor", "star", "chair", "book", "chart"]
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

          # ---------- ABOUT ----------
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - label: "Background Image (water)"
                name: "backgroundImage"
                widget: "image"
                required: false
                hint: "Leave empty to use the built-in gradient background."
              - { label: "Heading Line 1", name: "headingLine1", widget: "string" }
              - { label: "Heading Line 2", name: "headingLine2", widget: "string" }
              - { label: "Heading Line 3 (gold)", name: "headingLine3Gold", widget: "string" }
              - { label: "Sub Line 1", name: "subLine1", widget: "string" }
              - { label: "Sub Line 2", name: "subLine2", widget: "string" }
              - { label: "Sub Line 3", name: "subLine3", widget: "string" }
              - { label: "Sub Line 4", name: "subLine4", widget: "string" }
              - { label: "Button Label", name: "ctaLabel", widget: "string" }
              - { label: "Button Link", name: "ctaHref", widget: "string" }
              - { label: "Portrait Image", name: "portraitImage", widget: "image" }
              - label: "Portrait Image — Alt Text (SEO)"
                name: "portraitAlt"
                widget: "string"
                hint: "Describe the photo for search engines & screen readers, e.g. 'Gillian Arnold Atlas, on-camera acting coach in St. Petersburg, FL'."
              - { label: "Pull Quote", name: "quote", widget: "text" }
              - { label: "Quote Author", name: "quoteAuthor", widget: "string" }
              - { label: "Biography", name: "bio", widget: "text" }

          # ---------- TESTIMONIALS ----------
          - label: "Testimonials"
            name: "testimonials"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Headshot", name: "image", widget: "image" }
                  - { label: "Quote", name: "quote", widget: "text" }

          # ---------- SERVICES ----------
          - label: "Services (Work With Gillian)"
            name: "services"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options: ["clapperboard", "masks", "camera", "monitor", "star", "chair", "book", "chart"]
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Button Label", name: "ctaLabel", widget: "string" }
                  - { label: "Button Link", name: "ctaHref", widget: "string" }

          # ---------- SERVICE STRIP ----------
          - label: "Footer Service Strip"
            name: "serviceStrip"
            widget: "object"
            fields:
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options: ["clapperboard", "masks", "camera", "monitor", "star", "chair", "book", "chart"]
                  - { label: "Label", name: "label", widget: "string" }

          # ---------- CONTACT ----------
          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Button Label", name: "ctaLabel", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }

          # ---------- SOCIAL ----------
          - label: "Social Links"
            name: "social"
            widget: "list"
            label_singular: "Social Link"
            summary: "{{fields.platform}}"
            fields:
              - label: "Platform"
                name: "platform"
                widget: "select"
                options: ["facebook", "linkedin", "instagram", "youtube", "tiktok", "x", "imdb"]
              - { label: "URL", name: "url", widget: "string" }

          # ---------- FOOTER ----------
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Logo", name: "logo", widget: "image" }
              - { label: "Brand Line 1 (for accessibility)", name: "brandLine1", widget: "string" }
              - { label: "Brand Line 2 (for accessibility)", name: "brandLine2", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "text" }
              - { label: "Copyright", name: "copyright", widget: "string" }

  # ============================================================
  # GALLERY — photos & videos of Gillian's work (add as many as you like)
  # ============================================================
  - name: "gallery"
    label: "Gallery"
    label_singular: "Gallery Item"
    description: "Photos and videos of your work. Upload a file and add a caption."
    folder: "src/content/gallery"
    create: true
    delete: true
    extension: "json"
    format: "json"
    identifier_field: "caption"
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}{{minute}}{{second}}"
    summary: "{{caption}}"
    sortable_fields: ["date"]
    fields:
      - label: "Image or Video"
        name: "media"
        widget: "file"
        hint: "Photo (JPG, PNG, WEBP, AVIF, GIF) or video (MP4, WEBM, MOV)."
      - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Date"
        name: "date"
        widget: "datetime"
        required: false
        default: ""
        hint: "Controls order — newest shows first. Leave as-is for now."

  # ============================================================
  # RESOURCES / BLOG — SEO articles (self-tape tips, on-camera technique, etc.)
  # ============================================================
  - name: "resources"
    label: "Resources / Blog"
    label_singular: "Article"
    description: "SEO articles for actors. Each post targets a search phrase."
    folder: "src/content/resources"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title (H1 + browser title)", name: "title", widget: "string" }
      - label: "Meta Description (SEO)"
        name: "description"
        widget: "text"
        pattern: ['^.{50,165}$', "Aim for 150–160 characters, and lead with your target phrase."]
        hint: "150–160 characters. Front-load the keyword phrase."
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Last Updated", name: "updated", widget: "datetime", required: false }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - label: "Featured Image — Alt Text"
        name: "imageAlt"
        widget: "string"
        required: false
        hint: "Required if you add an image. Describe it naturally for SEO & accessibility."
      - { label: "Draft (hide from site)", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
